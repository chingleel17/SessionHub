name: 功能建議
description: 提出新功能或使用體驗改善
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解決的問題
      description: 請描述目前的使用情境與痛點。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建議方案
      description: 你希望 SessionHub 如何支援這個情境？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 目前替代方案
    validations:
      required: false
